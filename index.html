<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SJTCG Card Database</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <img class="site-logo" src="assets/sjtcg-logo.svg" alt="SJTCG - Shonen Jump Trading Card Game" />
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">Dark</button>
    </div>
    <p>Browse cards by image, card number, release, set, and color.</p>
  </header>

  <main class="page">
    <section class="controls" aria-label="Search and filters">
      <div class="control-group">
        <label for="searchInput">Search</label>
        <input id="searchInput" type="search" placeholder="Search card number, release, set, or color..." autocomplete="off" />
      </div>

      <div id="quickFilters" class="quick-filters" aria-label="Quick filters"></div>

      <div class="filter-row">
        <div class="control-group">
          <label for="releaseFilter">Release</label>
          <select id="releaseFilter"><option value="">All releases</option></select>
        </div>
        <div class="control-group">
          <label for="setFilter">Set</label>
          <select id="setFilter"><option value="">All sets</option></select>
        </div>
        <div class="control-group">
          <label for="colorFilter">Color</label>
          <select id="colorFilter"><option value="">All colors</option></select>
        </div>
        <div class="control-group">
          <label for="sortSelect">Sort</label>
          <select id="sortSelect">
            <option value="default">Default order</option>
            <option value="number">Card number</option>
            <option value="release">Release</option>
            <option value="set">Set</option>
            <option value="color">Color</option>
          </select>
        </div>
      </div>

      <div class="actions-row">
        <p id="resultCount">Loading cards...</p>
        <button id="resetButton" type="button">Reset</button>
      </div>
    </section>

    <section id="cardGrid" class="card-grid" aria-live="polite"></section>

    <section id="emptyState" class="empty-state" hidden>
      <h2>No cards found</h2>
      <p>Try changing your search or filters.</p>
    </section>
  </main>

  <div id="cardModal" class="modal" hidden>
    <div class="modal-backdrop" data-close-modal></div>
    <article class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" type="button" aria-label="Close" data-close-modal>&times;</button>
      <button id="modalPrev" class="modal-arrow modal-prev" type="button" aria-label="Previous card">&#8249;</button>
      <button id="modalNext" class="modal-arrow modal-next" type="button" aria-label="Next card">&#8250;</button>
      <img id="modalImage" class="modal-image" src="" alt="" />
      <div class="modal-info">
        <h2 id="modalTitle"></h2>
        <p id="modalMeta"></p>
      </div>
    </article>
  </div>

  <script src="app.js"></script>
</body>
</html>
