<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Card Image Database</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <h1>Card Image Database</h1>
    <p>Browse cards by image, card number, release, and set.</p>
  </header>

  <main class="page">
    <section class="controls" aria-label="Search and filters">
      <div class="control-group">
        <label for="searchInput">Search</label>
        <input id="searchInput" type="search" placeholder="Search card number, release, or set..." autocomplete="off" />
      </div>

      <div class="filter-row">
        <div class="control-group">
          <label for="releaseFilter">Release</label>
          <select id="releaseFilter">
            <option value="">All releases</option>
          </select>
        </div>

        <div class="control-group">
          <label for="setFilter">Set</label>
          <select id="setFilter">
            <option value="">All sets</option>
          </select>
        </div>

        <div class="control-group">
          <label for="sortSelect">Sort</label>
          <select id="sortSelect">
            <option value="number">Card number</option>
            <option value="release">Release</option>
            <option value="set">Set</option>
          </select>
        </div>
      </div>

      <div class="actions-row">
        <p id="resultCount">Loading cards...</p>
        <button id="resetButton" type="button">Reset</button>
      </div>
    </section>

    <section id="cardGrid" class="card-grid" aria-live="polite"></section>

    <section id="emptyState" class="empty-state" hidden>
      <h2>No cards found</h2>
      <p>Try changing your search or filters.</p>
    </section>
  </main>

  <div id="cardModal" class="modal" hidden>
    <div class="modal-backdrop" data-close-modal></div>

    <article class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" type="button" aria-label="Close" data-close-modal>&times;</button>
      <img id="modalImage" class="modal-image" src="" alt="" />
      <div class="modal-info">
        <h2 id="modalTitle"></h2>
        <p id="modalMeta"></p>
      </div>
    </article>
  </div>

  <script src="app.js"></script>
</body>
</html>
