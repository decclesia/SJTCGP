<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SJTCG Card Database</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="./" aria-label="SJTCG home">
        <span class="brand-main"><span class="brand-sj">SJ</span><span class="brand-tcg">TCG</span></span>
        <span class="brand-line" aria-hidden="true"></span>
        <span class="brand-subtitle">SHONEN JUMP TRADING CARD GAME</span>
      </a>
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">Dark</button>
    </div>
  </header>

  <main class="page">
    <section class="controls" aria-label="Search and filters">
      <div class="top-controls">
        <div class="control-group search-group">
          <label for="searchInput">Search</label>
          <input id="searchInput" type="search" placeholder="Card number, release, set, or color..." autocomplete="off" />
        </div>
        <div class="control-group sort-group">
          <label for="sortSelect">Sort</label>
          <select id="sortSelect">
            <option value="default">Default</option>
            <option value="number">Card number</option>
            <option value="release">Release</option>
            <option value="set">Set</option>
            <option value="color">Color</option>
          </select>
        </div>
      </div>

      <div class="filter-stack">
        <div class="filter-section">
          <h2>Release</h2>
          <div id="releaseFilters" class="filter-buttons" aria-label="Release filters"></div>
        </div>
        <div class="filter-section">
          <h2>Set</h2>
          <div id="setFilters" class="filter-buttons" aria-label="Set filters"></div>
        </div>
        <div class="filter-section color-section">
          <h2>Color</h2>
          <div id="colorFilters" class="filter-buttons color-buttons" aria-label="Color filters"></div>
        </div>
      </div>

      <div class="actions-row">
        <p id="resultCount">Loading cards...</p>
        <button id="resetButton" class="reset-button" type="button">Reset</button>
      </div>
    </section>

    <section id="cardGrid" class="card-grid" aria-live="polite"></section>

    <section id="emptyState" class="empty-state" hidden>
      <h2>No cards found</h2>
      <p>Try changing your search or filters.</p>
    </section>
  </main>

  <div id="cardModal" class="modal" hidden>
    <div class="modal-backdrop" data-close-modal></div>
    <article class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" type="button" aria-label="Close" data-close-modal>&times;</button>
      <button id="modalPrev" class="modal-arrow modal-prev" type="button" aria-label="Previous card">&#8249;</button>
      <button id="modalNext" class="modal-arrow modal-next" type="button" aria-label="Next card">&#8250;</button>
      <img id="modalImage" class="modal-image" src="" alt="" />
      <div class="modal-info">
        <h2 id="modalTitle"></h2>
        <p id="modalMeta"></p>
      </div>
    </article>
  </div>

  <script src="app.js"></script>
</body>
</html>
