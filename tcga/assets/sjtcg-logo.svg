<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" role="img" aria-labelledby="title desc">
  <title id="title">SJTCG - Shonen Jump Trading Card Game</title>
  <desc id="desc">Black and gold SJTCG wordmark on a transparent background.</desc>
  <defs>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f2cf6b"/>
      <stop offset="0.45" stop-color="#c89a2c"/>
      <stop offset="1" stop-color="#8b6415"/>
    </linearGradient>
  </defs>
  <g transform="translate(70 58) skewX(-14)">
    <text x="0" y="92" font-family="Arial Black, Impact, system-ui, sans-serif" font-size="108" font-weight="900" letter-spacing="8" fill="url(#gold)">SJ</text>
    <text x="260" y="92" font-family="Arial Black, Impact, system-ui, sans-serif" font-size="108" font-weight="900" letter-spacing="8" fill="currentColor">TCG</text>
  </g>
  <g transform="translate(170 190)">
    <line x1="0" y1="0" x2="70" y2="0" stroke="#c89a2c" stroke-width="6"/>
    <text x="100" y="11" font-family="Arial, system-ui, sans-serif" font-size="28" font-weight="800" letter-spacing="14" fill="currentColor">SHONEN JUMP TRADING CARD GAME</text>
    <line x1="880" y1="0" x2="950" y2="0" stroke="#c89a2c" stroke-width="6"/>
  </g>
</svg>